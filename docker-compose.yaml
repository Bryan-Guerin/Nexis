# Déploiement : application all-in-one (front + back) en conteneur, branchée sur le
# PostgreSQL qui tourne en SERVICE SYSTÈME sur l'hôte (hors Docker, persistant).
# Reverse-proxy Caddy optionnel (profil "https").
#
#   docker compose up -d                # démarre l'app (pull de l'image)
#   docker compose logs -f app
#   docker compose down                 # arrête l'app (la base hôte n'est pas touchée)
#
# Les secrets/paramètres se règlent dans un fichier .env (voir .env.example).

services:
  app:
    # Image publiée sur Docker Hub par la CI. Sur le VPS on la « pull » (pas de build).
    # En local, docker-compose.override.yaml ajoute `build: .` pour construire à la place.
    image: ${NEXIS_IMAGE:-bryanguerin/nexis:latest}
    # Tourne avec l'UID/GID de ton user Debian (nexis) pour que les logs écrits dans
    # le volume monté lui appartiennent. Récupère-les avec `id -u` / `id -g`.
    user: "${PUID:-1000}:${PGID:-1000}"
    # Permet au conteneur de joindre le PostgreSQL qui tourne en service sur l'hôte
    # (hors Docker) : host.docker.internal pointe vers la passerelle de l'hôte.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Empêche le chargement du profil "dev" (localhost) : seules les variables
      # DATASOURCES_DEFAULT_* ci-dessous font foi en production.
      MICRONAUT_ENVIRONMENTS: prod
      # PostgreSQL = service système sur l'hôte (pas un conteneur). On le joint via
      # host.docker.internal. Les identifiants doivent correspondre au user/base créés
      # sur l'hôte (POSTGRES_USER / POSTGRES_PASSWORD du .env).
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://host.docker.internal:5432/nexis
      DATASOURCES_DEFAULT_USERNAME: ${POSTGRES_USER:-nexis}
      DATASOURCES_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:?définissez le mot de passe du user nexis dans .env}
      # Secret JWT HS256 — OBLIGATOIRE, ≥ 32 caractères. Le `:?` fait échouer
      # le démarrage si la variable n'est pas définie (pas de défaut faible en prod).
      JWT_GENERATOR_SIGNATURE_SECRET: ${JWT_GENERATOR_SIGNATURE_SECRET:?définissez un secret fort dans .env}
      # Config externalisée (montée depuis l'hôte) : surcharge l'application.properties
      # packagé sans rebuild. Les variables d'env ci-dessus restent prioritaires.
      MICRONAUT_CONFIG_FILES: /config/application.properties
      # -Dlog4j2.configurationFile : config de log externe ; -DLOG_DIR : dossier logs.
      JAVA_OPTS: -Dlog4j2.configurationFile=/config/log4j2.xml -DLOG_DIR=/logs ${JAVA_OPTS:-}
    volumes:
      # Config externalisée (lecture seule). Les fichiers DOIVENT exister sur l'hôte
      # avant le démarrage (sinon Docker crée des dossiers à la place des fichiers).
      - /opt/volumes/nexis/application.properties:/config/application.properties:ro
      - /opt/volumes/nexis/log4j2.xml:/config/log4j2.xml:ro
      # Logs persistés sur l'hôte (lecture/écriture).
      - /opt/volumes/nexis/logs:/logs
      # Branding paramétrable (logo caserne SP…) servi sur /branding/** par l'app.
      # Dépose tes images dans /opt/volumes/nexis/branding/ (ex: sp-logo.png).
      - /opt/volumes/nexis/branding:/branding:ro
    # /health (Micronaut Management) : healthcheck applicatif → DOWN si la DB tombe.
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    # Port exposé directement — accessible via http://<IP_VPS>:8080 sans domaine.
    # Quand tu as un domaine, couper ce port (commenter) et activer le profil https.
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

  # ── Reverse proxy HTTPS ───────────────────────────────────────────────────────
  # Démarrage : docker compose --profile https up -d
  # Prérequis : NEXIS_DOMAIN + ACME_EMAIL définis dans .env, ports 80/443 ouverts.
  # Quand Caddy est actif, désactiver le port 8080 ci-dessus pour ne pas l'exposer.
  caddy:
    profiles: ["https"]
    image: caddy:2-alpine
    depends_on:
      app:
        condition: service_healthy
    environment:
      # Domaine public. Ex: nexis.mondomaine.fr
      NEXIS_DOMAIN: ${NEXIS_DOMAIN:?définissez NEXIS_DOMAIN dans .env (ex nexis.mondomaine.fr)}
      ACME_EMAIL: ${ACME_EMAIL:?définissez ACME_EMAIL dans .env pour Let's Encrypt}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data     # certificats Let's Encrypt (à persister !)
      - caddy-config:/config
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"        # HTTP/3 (QUIC)
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
