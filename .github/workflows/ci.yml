name: CI

on:
  push:              # tests sur toute branche poussée
  pull_request:      # tests à l'ouverture / mise à jour d'une PR

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # Le frontend-maven-plugin télécharge Node v22.15.0 et l'installe sous
      # nexis-app/front/node — on le met en cache pour accélérer les runs.
      - name: Cache Node (frontend-maven-plugin)
        uses: actions/cache@v4
        with:
          path: |
            nexis-app/front/node
            nexis-app/front/node_modules
          key: front-${{ runner.os }}-${{ hashFiles('nexis-app/front/package.json') }}

      - name: Fix mvnw permissions
        run: chmod +x mvnw

      # `verify -DskipTests` : build front (npm) + back, package, ET compile les sources
      # de test (attrape les ruptures de signature) — sans EXÉCUTER les tests.
      # Les tests @MicronautTest (ex. NexisTest) bootent le contexte → datasource via
      # Micronaut test-resources = conteneur Postgres (Docker), indisponible sur le runner.
      # Le déploiement (Dockerfile) skip déjà les tests. Pour exécuter les tests en CI,
      # voir option « service Postgres » (datasource explicite, test-resources désactivé).
      - name: Build + compilation des tests (front + back)
        run: ./mvnw -B -ntp verify -DskipTests -Denforcer.skip=true
