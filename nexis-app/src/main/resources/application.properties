micronaut.application.name=nexis

# Base de données
# NB : url/username/password ne sont PAS ici volontairement.
#   - dev   → application-dev.properties (localhost, profil activé par défaut)
#   - test  → fournis par Micronaut Test Resources (container PostgreSQL)
#   - prod  → variables d'env DATASOURCES_DEFAULT_* (docker-compose)
# db-type reste ici : Test Resources s'en sert pour choisir l'image du container.
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
datasources.default.driver-class-name=org.postgresql.Driver
# Pool de connexions HikariCP (défaut = 10). Relevé à 20 : le travail bloquant des
# controllers est déchargé sur le pool « blocking » (@ExecuteOn TaskExecutors.BLOCKING),
# qui peut tenir plus de requêtes DB concurrentes sans saturer l'event-loop.
datasources.default.maximum-pool-size=30
# Expose les MBeans HikariCP (JMX) → suivi du pool dans Glowroot (gauge :
# ActiveConnections / ThreadsAwaitingConnection = saturation = requêtes en attente).
# pool-name fixe → MBean prévisible : com.zaxxer.hikari:type=Pool (nexis-default)
datasources.default.register-mbeans=true
datasources.default.pool-name=nexis-default
jpa.default.properties.hibernate.hbm2ddl.auto=none
jpa.default.properties.hibernate.show_sql=false
# Batch fetching : Hibernate charge les associations LAZY de plusieurs entités en
# une poignée de requêtes (par lots) au lieu d'une par entité (N+1). Couvre p.ex.
# user/qualifications de la liste des membres (tirée à chaque écran dispatch/inter).
jpa.default.properties.hibernate.default_batch_fetch_size=100

# Sérialisation JSON : ne pas omettre les collections vides (sinon [] disparaît du payload)
micronaut.serde.serialization.inclusion=non_null

# Upload de documents PDF (défaut Micronaut = 1 Mo, trop bas)
micronaut.server.max-request-size=27262976
micronaut.server.multipart.max-file-size=26214400


# Flyway
flyway.datasources.default.enabled=true

# Sécurité JWT
micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}
# Durée de vie de l'access token : 8 h (défaut Micronaut = 1 h).
# NB Micronaut Security 5 : la clé est .token.generator (sans .jwt, qui ne sert que pour le refresh-token).
micronaut.security.token.generator.access-token.expiration=28800

# Endpoints sécurité sous /api pour cohérence avec le proxy Vite
micronaut.security.endpoints.login.path=/api/login
micronaut.security.endpoints.logout.path=/api/logout

# Ressources statiques (frontend Svelte compilé)
micronaut.router.static-resources.default.paths=classpath:public
micronaut.router.static-resources.default.mapping=/**

# Branding paramétrable par instance (logo caserne SP, etc.) : fichiers servis depuis
# un dossier sur disque, monté en volume. Permet de changer le logo sans rebuild.
# Dossier surchargeable via NEXIS_BRANDING_DIR (défaut : /branding dans le conteneur).
micronaut.router.static-resources.branding.paths=file:${NEXIS_BRANDING_DIR:/branding}
micronaut.router.static-resources.branding.mapping=/branding/**

# Fonds de carte (tuiles sat, geojson, meta…) servis depuis un volume monté, hors jar
# (assets volumineux). Dépose-les dans NEXIS_MAP_DIR (défaut : /map dans le conteneur).
# En dev, pointer NEXIS_MAP_DIR vers un dossier local contenant unreallife/.
micronaut.router.static-resources.map.paths=file:${NEXIS_MAP_DIR:/map}
micronaut.router.static-resources.map.mapping=/map/**

# Sécurité : les ressources statiques sont publiques, la sécurité est portée par @Secured sur chaque controller
micronaut.security.intercept-url-map[0].pattern=/**
micronaut.security.intercept-url-map[0].access[0]=isAnonymous()

# Endpoint de santé (/health) — utilisé par le healthcheck Docker et le reverse-proxy.
# Anonyme + détails visibles (statut DB via l'indicateur JDBC).
endpoints.health.enabled=true
endpoints.health.sensitive=false
endpoints.health.details-visible=ANONYMOUS
