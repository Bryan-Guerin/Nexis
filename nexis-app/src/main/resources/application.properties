micronaut.application.name=nexis

# Base de données
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
datasources.default.driver-class-name=org.postgresql.Driver
datasources.default.url=jdbc:postgresql://localhost:5432/nexis
datasources.default.username=postgres
datasources.default.password=postgres
jpa.default.properties.hibernate.hbm2ddl.auto=none
jpa.default.properties.hibernate.show_sql=false

# Sérialisation JSON : ne pas omettre les collections vides (sinon [] disparaît du payload)
micronaut.serde.serialization.inclusion=non_null

# Upload de documents PDF (défaut Micronaut = 1 Mo, trop bas)
micronaut.server.max-request-size=27262976
micronaut.server.multipart.max-file-size=26214400


# Flyway
flyway.datasources.default.enabled=true

# Sécurité JWT
micronaut.security.authentication=bearer
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}
# Durée de vie de l'access token : 8 h (défaut Micronaut = 1 h).
# NB Micronaut Security 5 : la clé est .token.generator (sans .jwt, qui ne sert que pour le refresh-token).
micronaut.security.token.generator.access-token.expiration=28800

# Endpoints sécurité sous /api pour cohérence avec le proxy Vite
micronaut.security.endpoints.login.path=/api/login
micronaut.security.endpoints.logout.path=/api/logout

# Ressources statiques (frontend Svelte compilé)
micronaut.router.static-resources.default.paths=classpath:public
micronaut.router.static-resources.default.mapping=/**

# Sécurité : les ressources statiques sont publiques, la sécurité est portée par @Secured sur chaque controller
micronaut.security.intercept-url-map[0].pattern=/**
micronaut.security.intercept-url-map[0].access[0]=isAnonymous()

# Endpoint de santé (/health) — utilisé par le healthcheck Docker et le reverse-proxy.
# Anonyme + détails visibles (statut DB via l'indicateur JDBC).
endpoints.health.enabled=true
endpoints.health.sensitive=false
endpoints.health.details-visible=ANONYMOUS
