# Surcharge pour les tests automatisés.
#
# Micronaut Test Resources remplace une propriété UNIQUEMENT si elle est absente
# ou vide. Comme application.properties déclare datasources.default.url avec une
# adresse locale, on l'écrase ici avec une chaîne vide : le service Test Resources
# détecte "url manquante" et démarre un container PostgreSQL via Testcontainers.
#
# Le db-type "postgresql" est la valeur reconnue par le resolver JDBC ; "postgres"
# ne déclenchait pas le bon provider.

datasources.default.url=
datasources.default.db-type=postgresql
datasources.default.username=
datasources.default.password=
